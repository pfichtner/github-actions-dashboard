<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Actions Dashboard</title>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }

    .success { background-color: #c8f7c5; }
    .failure { background-color: #f7c5c5; }
    .neutral { background-color: #f0f0f0; }

    /* Type styling */
    .type-human-pr { border-left: 6px solid #4a90e2; }
    .type-bot-pr { border-left: 6px solid #9b59b6; opacity: 0.95; }
    .type-bot-maintenance { border-left: 6px solid #34495e; font-style: italic; opacity: 0.9; }
    .type-main { border-left: 6px solid #27ae60; }
    .type-scheduled { border-left: 6px solid #7f8c8d; }
    .type-manual { border-left: 6px solid #16a085; }

    /* Legend */
    #legend { margin-bottom: 15px; }
    .legend-item {
      display: inline-block;
      padding: 4px 8px;
      margin-right: 8px;
      border-left: 6px solid transparent;
      background: #fafafa;
      font-size: 0.9em;
    }

    /* Filters */
    #filters { margin-bottom: 15px; }
    #filters button {
      margin-right: 8px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Latest GitHub Actions Runs</h1>

  <!-- Legend -->
  <div id="legend">
    <strong>Legend:</strong>
    <span class="legend-item type-human-pr">👤 PR</span>
    <span class="legend-item type-bot-pr">🤖 Bot PR</span>
    <span class="legend-item type-bot-maintenance">⚙ Bot maintenance runs</span>
    <span class="legend-item type-main">🚀 Main</span>
  </div>

  <!-- Filters -->
  <div id="filters">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('no-bots')">Hide Bots</button>
    <button onclick="setFilter('only-pr')">Only PRs</button>
    <button onclick="setFilter('failures')">Only Failures</button>
  </div>

  <table id="runsTable">
    <thead>
      <tr>
        <th>Repository</th>
        <th>Workflow</th>
        <th>Branch</th>
        <th>Type</th>
        <th>Status</th>
        <th>Conclusion</th>
        <th>Created</th>
        <th>URL</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let currentFilter = 'all';

    function setFilter(filter) {
      currentFilter = filter;
      loadRuns();
    }

    function classifyRun(run) {
      const event = run.event || '';
      const branch = run.headBranch || '';
      const workflow = (run.workflowName || '').toLowerCase();

      const isPR = event === 'pull_request';
      const isRenovateBranch = branch.startsWith('renovate/');
      const isDependabotBranch = branch.startsWith('dependabot/');

      // Bot workflows
      const botWorkflows = ['renovate', 'dependabot', 'scorecard', 'supply-chain'];
      const isBotWorkflow = botWorkflows.some(bot => workflow.includes(bot));

      // Maintenance runs (scheduled/manual bot runs)
      if (isBotWorkflow && !isPR) {
        return { type: 'bot-maintenance', label: '⚙ Bot', css: 'type-bot-maintenance' };
      }

      // Bot PRs
      if (isPR && (isRenovateBranch || isDependabotBranch)) return { type: 'bot-pr', label: '🤖 Bot PR', css: 'type-bot-pr' };

      // Human PR
      if (isPR) return { type: 'human-pr', label: '👤 PR', css: 'type-human-pr' };

      // Main push
      if (event === 'push' && branch === 'main') return { type: 'main-push', label: '🚀 Main', css: 'type-main' };

      // Scheduled workflow
      if (event === 'schedule') return { type: 'scheduled', label: '⏰ Scheduled', css: 'type-scheduled' };

      // Manual dispatch
      if (event === 'workflow_dispatch') return { type: 'manual', label: '▶ Manual', css: 'type-manual' };

      // Fallback
      return { type: 'other', label: event, css: 'type-other' };
    }

    async function loadRuns() {
      try {
        const resp = await fetch('runs.json?' + Date.now());
        const data = await resp.json();
        const tbody = document.querySelector('#runsTable tbody');
        tbody.innerHTML = '';

        const filteredData = data.filter(run => {
          const classification = classifyRun(run);

          if (currentFilter === 'no-bots') return !classification.type.startsWith('bot');
          if (currentFilter === 'only-pr') return run.event === 'pull_request';
          if (currentFilter === 'failures') return run.conclusion === 'failure';

          return true;
        });

        filteredData.forEach(run => {
          const tr = document.createElement('tr');
          tr.className =
            run.conclusion === 'success' ? 'success' :
            run.conclusion === 'failure' ? 'failure' :
            'neutral';

          const classification = classifyRun(run);
          tr.classList.add(classification.css);

          tr.innerHTML = `
            <td>${run.repository}</td>
            <td>${run.workflowName}</td>
            <td>${run.headBranch || '-'}</td>
            <td>${classification.label}</td>
            <td>${run.status}</td>
            <td>${run.conclusion || '-'}</td>
            <td>${new Date(run.createdAt).toLocaleString()}</td>
            <td><a href="${run.url}" target="_blank">link</a></td>
          `;
          tbody.appendChild(tr);
        });

      } catch (e) {
        console.error('Failed to load runs.json', e);
      }
    }

    loadRuns();
    setInterval(loadRuns, 300000); // refresh every 5 minutes
  </script>
</body>
</html>
