# .github/workflows/update-runs.yml
name: Update Runs JSON
on:
  schedule:
    - cron: "5 * * * *"  # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup GitHub CLI
        run: sudo apt install gh -y
      - name: Generate runs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          CUTOFF=$(date -u -d '72 hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          gh repo list $OWNER --limit 200 --json nameWithOwner -q '.[].nameWithOwner' | \
          while read repo; do
            gh run list -R "$repo" --limit 100 --json databaseId,workflowName,status,conclusion,createdAt,url | \
            jq --arg repo "$repo" --arg cutoff "$CUTOFF" '.[] | select(.createdAt >= $cutoff) + {repository: $repo}'
          done | jq -s 'sort_by(.createdAt) | reverse'
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs.json
          git commit -m "Update runs.json" || echo "No changes"
          git push

