# .github/workflows/update-runs.yml
name: Update Runs JSON
on:
  schedule:
    - cron: "5 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate runs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          DASHBOARD_REPO="$GITHUB_REPOSITORY"
          gh repo list $OWNER --limit 200 --json nameWithOwner -q '.[].nameWithOwner' | \
          while read repo; do
            if [ "$repo" = "$DASHBOARD_REPO" ]; then
              continue
            fi

            gh run list -R "$repo" --limit 5 --json databaseId,workflowName,status,conclusion,createdAt,url,headBranch,event | \
            jq --arg repo "$repo" '.[] + {repository: $repo}'
          done | jq -s '
            now as $now |
            map(select(
              (.createdAt | fromdateiso8601) >= ($now - (72 * 3600))
            ))
            | sort_by(.createdAt)
            | reverse
            | .[:100]
          ' > runs.json

      - name: Generate open-prs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          DASHBOARD_REPO="$GITHUB_REPOSITORY"

          gh repo list $OWNER --limit 200 --json nameWithOwner -q '.[].nameWithOwner' | \
          while read repo; do
            if [ "$repo" = "$DASHBOARD_REPO" ]; then
              continue
            fi

            gh pr list -R "$repo" --state open --limit 100 --json number,title,author,url,createdAt,headRefName,baseRefName | \
            jq --arg repo "$repo" '.[] + {repository: $repo}'
          done | jq -s '
            sort_by(.createdAt)
            | reverse
          ' > open-prs.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs.json open-prs.json
          git commit -m "Update json files" || echo "No changes"
          git push

