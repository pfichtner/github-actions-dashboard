# .github/workflows/update-runs.yml
name: Update Runs JSON
on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v3
      - name: Setup GitHub CLI
        run: sudo apt install gh -y
      - name: Generate runs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          DASHBOARD_REPO="$GITHUB_REPOSITORY"
          CUTOFF=$(date -u -d '72 hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          
          ALL_RUNS="[]"
          
          gh repo list $OWNER --limit 200 --json nameWithOwner -q '.[].nameWithOwner' | while read repo; do
            # Skip the dashboard repo itself
            if [ "$repo" = "$DASHBOARD_REPO" ]; then
              continue
            fi
          
            # Get runs from last 72h
            RUNS=$(gh run list -R "$repo" --limit 100 --json databaseId,workflowName,status,conclusion,createdAt,url --created "$CUTOFF")
          
            # Only proceed if RUNS is not empty
            if [ "$RUNS" != "[]" ]; then
              # Add repository field to each run
              FILTERED=$(echo "$RUNS" | jq --arg repo "$repo" '.[] + {repository: $repo}')
              # Merge into ALL_RUNS
              ALL_RUNS=$(echo "$ALL_RUNS" | jq --argjson arr "[$FILTERED]" '. + $arr')
            fi
          done
          
          # Sort by createdAt descending
          echo "$ALL_RUNS" | jq 'sort_by(.createdAt) | reverse' > runs.json
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs.json
          git commit -m "Update runs.json" || echo "No changes"
          git push

